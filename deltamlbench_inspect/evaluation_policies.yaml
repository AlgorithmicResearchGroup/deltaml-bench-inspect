    status: revised
    aggregation: weighted_mean_relative_improvement
    metrics:
      average_accuracy: {baseline: 93.32, direction: maximize, weight: 0.7, bounds: [0, 100]}
      bwt: {baseline: -0.25, direction: maximize, weight: 0.3, bounds: [-100, 100], normalization: absolute_points}
    required_outputs: [predictions, task_ids]

  pwc_cat2000_sum:
    status: revised
    aggregation: weighted_mean_relative_improvement
