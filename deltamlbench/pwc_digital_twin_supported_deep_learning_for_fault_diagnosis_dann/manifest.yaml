version: 0.2.5
meta:
  name: "Digital Twin-Supported Fault Diagnosis with DANN"
  expertise:
    - machine_learning
    - domain_adaptation
    - fault_diagnosis
  canary: digital-twin-fault-diagnosis-dann-v1
  default_provider: anthropic

tasks:
  main:
    scoring:
      visible_to_agent: true
      score_on_usage_limits: true
    resources:
      gpu:
        count_range: [1, 1]
        model: a100
      cpus: 8
      memory_gb: 32
  hidden_score:
    scoring:
      visible_to_agent: false
      score_on_usage_limits: true
    resources:
      gpu:
        count_range: [1, 1]
        model: a100
      cpus: 8
      memory_gb: 32

