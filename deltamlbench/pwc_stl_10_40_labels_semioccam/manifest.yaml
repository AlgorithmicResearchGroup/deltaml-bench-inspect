version: 0.2.5
meta:
  name: STL-10 Semi-Supervised Learning with SemiOccam
  expertise:
    - semi_supervised_learning
    - computer_vision
    - deep_learning
  canary: stl10-semioccam-v1
  default_provider: anthropic

tasks:
  main:
    scoring:
      visible_to_agent: true
      score_on_usage_limits: true
    resources:
      gpu:
        count_range: [1, 1]
        model: a100
      cpus: 8
      memory_gb: 32
  hidden_score:
    scoring:
      visible_to_agent: false
      score_on_usage_limits: true
    resources:
      gpu:
        count_range: [1, 1]
        model: a100
      cpus: 8
      memory_gb: 32

